services:
  - type: web
    name: apex-terminal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dashboard.py
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.9.18
