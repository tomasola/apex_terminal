services:
  - type: web
    name: apex-terminal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k gevent -w 1 --bind 0.0.0.0:$PORT dashboard:app
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.9.18
