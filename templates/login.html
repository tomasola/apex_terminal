<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Terminal | Securizado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            background-color: #0b0e14;
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1e293b 0%, transparent 40%),
                radial-gradient(circle at bottom left, #0f172a 0%, transparent 40%);
        }

        .login-container {
            background: rgba(15, 23, 42, 0.7);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #3b82f6;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            background: #0b0e14;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            text-align: center;
            letter-spacing: 5px;
            font-family: monospace;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 1px;
        }

        button:hover {
            background: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">APEX</div>
        <div class="subtitle">SISTEMA RESTRINGIDO</div>

        {% if error %}
        <div class="error-message show">Contraseña incorrecta. Inténtalo de nuevo.</div>
        {% endif %}

        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="••••••" autofocus required
                autocomplete="current-password">
            <button type="submit">ACCEDER A LA TERMINAL</button>
        </form>
    </div>

</body>

</html>
